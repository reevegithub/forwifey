<!-- Lee Business Profile UI Hotfix
Paste this block BEFORE the closing </body> tag of your index.html.
It removes duplicate/floating profile buttons and keeps only a clean top-right profile chip. -->
<style id="lee-profile-ui-hotfix-style">
  /* Hide the old forced floating profile button and duplicate sidebar profile buttons */
  #forceProfileBtn,
  .force-profile-btn,
  .floating-profile,
  .profile-floating,
  [data-force-profile="true"],
  .lb-v5-force-profile,
  .lee-v5-floating-profile {
    display: none !important;
  }

  /* If sidebar accidentally has two profile settings buttons, JS below keeps only the first. */
  .lb-top-profile-area {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-left: 8px;
  }

  .lb-presence-mini {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(226, 232, 240, 0.95);
    background: rgba(255, 255, 255, 0.72);
    color: #64748b;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
  }

  .lb-presence-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #22c55e;
    box-shadow: 0 0 0 4px rgba(34,197,94,.12);
  }

  .lb-profile-chip {
    border: 1px solid rgba(226, 232, 240, .95);
    background: rgba(255,255,255,.88);
    color: #0f172a;
    border-radius: 999px;
    min-height: 48px;
    padding: 5px 12px 5px 5px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 14px 35px rgba(15, 23, 42, .10);
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    font-family: Inter, system-ui, sans-serif;
    max-width: 235px;
  }

  .lb-profile-chip:hover {
    transform: translateY(-1px);
    border-color: rgba(37, 99, 235, .45);
    box-shadow: 0 18px 42px rgba(15, 23, 42, .14);
    background: #ffffff;
  }

  .lb-profile-avatar {
    width: 38px;
    height: 38px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    overflow: hidden;
    background: linear-gradient(135deg, #0f9f58, #2563eb);
    color: white;
    font-weight: 950;
    font-size: 15px;
    border: 3px solid rgba(255,255,255,.98);
    box-shadow: 0 0 0 3px rgba(34,197,94,.18);
    position: relative;
  }

  .lb-profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .lb-profile-avatar::after {
    content: '';
    position: absolute;
    right: -1px;
    bottom: -1px;
    width: 10px;
    height: 10px;
    border-radius: 999px;
    border: 2px solid white;
    background: #22c55e;
  }

  .lb-profile-copy {
    display: flex;
    flex-direction: column;
    min-width: 0;
    line-height: 1.08;
  }

  .lb-profile-name {
    font-size: 13px;
    font-weight: 950;
    color: #0f172a;
    max-width: 135px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .lb-profile-sub {
    font-size: 9px;
    font-weight: 950;
    color: #64748b;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .lb-profile-chevron {
    font-size: 10px;
    color: #94a3b8;
    margin-left: 2px;
  }

  html.dark .lb-profile-chip,
  .dark .lb-profile-chip {
    background: rgba(15,23,42,.90);
    border-color: rgba(51,65,85,.95);
    color: #e2e8f0;
  }

  html.dark .lb-profile-chip:hover,
  .dark .lb-profile-chip:hover {
    background: rgba(30,41,59,.96);
  }

  html.dark .lb-profile-name,
  .dark .lb-profile-name {
    color: #f8fafc;
  }

  html.dark .lb-presence-mini,
  .dark .lb-presence-mini {
    background: rgba(15,23,42,.86);
    border-color: rgba(51,65,85,.95);
    color: #cbd5e1;
  }

  @media (max-width: 900px) {
    .lb-presence-mini { display: none; }
    .lb-profile-copy { display: none; }
    .lb-profile-chip { padding: 5px; min-height: 46px; }
    .lb-profile-chevron { display: none; }
  }
</style>

<script id="lee-profile-ui-hotfix-script">
(function () {
  function safeText(value, fallback) {
    value = String(value || '').trim();
    return value || fallback || '';
  }

  function initials(name) {
    name = safeText(name, 'User');
    var parts = name.split(/\s+/).filter(Boolean);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  function getCurrentName() {
    return safeText(
      window.currentActorName ||
      window.CURRENT_USER?.name ||
      window.USER?.name ||
      localStorage.getItem('lee_profile_name') ||
      localStorage.getItem('leeBusinessProfileName') ||
      document.getElementById('myPresenceName')?.textContent ||
      document.getElementById('userName')?.textContent,
      'Profile'
    );
  }

  function getCurrentPhoto() {
    return safeText(
      window.currentActorPhoto ||
      window.CURRENT_USER?.picture ||
      window.USER?.picture ||
      localStorage.getItem('lee_profile_photo') ||
      localStorage.getItem('leeBusinessProfilePhoto') ||
      ''
    );
  }

  function removeBadProfileButtons() {
    var selectors = [
      '#forceProfileBtn', '.force-profile-btn', '.floating-profile', '.profile-floating',
      '[data-force-profile="true"]', '.lb-v5-force-profile', '.lee-v5-floating-profile'
    ];
    selectors.forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (el) { el.remove(); });
    });

    // Remove duplicate Profile Settings buttons in the sidebar/footer area, keep one only.
    var profileButtons = Array.from(document.querySelectorAll('button, a, div'))
      .filter(function (el) {
        var t = (el.textContent || '').trim().toLowerCase();
        return t === 'profile settings' || t === '👤 profile settings' || t === 'profile';
      })
      .filter(function (el) { return !el.closest('.lb-top-profile-area'); });

    var sidebarProfileButtons = profileButtons.filter(function (el) {
      var rect = el.getBoundingClientRect();
      return rect.left < (window.innerWidth * 0.45);
    });

    sidebarProfileButtons.forEach(function (el, idx) {
      if (idx > 0) el.remove();
    });
  }

  function findTopbarTarget() {
    var candidates = Array.from(document.querySelectorAll('header .flex, header, .topbar, .navbar, .app-header'));
    var best = null;
    var bestScore = -1;

    candidates.forEach(function (el) {
      var text = (el.textContent || '').toLowerCase();
      var score = 0;
      if (text.includes('sync')) score += 5;
      if (text.includes('csv')) score += 3;
      if (text.includes('pdf')) score += 3;
      if (text.includes('dashboard')) score += 1;
      var rect = el.getBoundingClientRect();
      if (rect.top < 180 && rect.width > 300) score += 3;
      if (score > bestScore) { best = el; bestScore = score; }
    });

    return best || document.querySelector('header') || document.body;
  }

  function openProfile() {
    if (typeof window.openProfileModal === 'function') return window.openProfileModal();
    if (typeof window.openProfileSettings === 'function') return window.openProfileSettings();
    if (typeof window.openProfile === 'function' && window.openProfile !== openProfile) return window.openProfile();

    var modal = document.getElementById('profileModal') || document.getElementById('profileSettingsModal');
    if (modal) {
      modal.classList.add('active', 'show');
      modal.style.display = 'flex';
      return;
    }

    alert('Profile settings modal was not found in this index.html. Please update using the latest Code.gs and index.html package.');
  }

  function buildProfileChip() {
    var old = document.getElementById('lbTopProfileArea');
    if (old) old.remove();

    var name = getCurrentName();
    var photo = getCurrentPhoto();
    var wrap = document.createElement('div');
    wrap.id = 'lbTopProfileArea';
    wrap.className = 'lb-top-profile-area';

    var presence = document.createElement('div');
    presence.className = 'lb-presence-mini';
    presence.innerHTML = '<span class="lb-presence-dot"></span><span id="lbOnlineText">Online</span>';

    var chip = document.createElement('button');
    chip.type = 'button';
    chip.id = 'lbTopProfileChip';
    chip.className = 'lb-profile-chip';
    chip.title = 'Open Profile Settings';
    chip.onclick = openProfile;

    var avatarHtml = photo
      ? '<img src="' + photo.replace(/"/g, '&quot;') + '" alt="Profile" onerror="this.remove(); document.getElementById(\'lbProfileInitials\').style.display=\'inline-flex\';">'
      : '';

    chip.innerHTML = '' +
      '<span class="lb-profile-avatar">' + avatarHtml + '<span id="lbProfileInitials" style="' + (photo ? 'display:none;' : 'display:inline-flex;') + 'align-items:center;justify-content:center;width:100%;height:100%;">' + initials(name) + '</span></span>' +
      '<span class="lb-profile-copy"><span class="lb-profile-name">' + name + '</span><span class="lb-profile-sub">Profile</span></span>' +
      '<span class="lb-profile-chevron">▾</span>';

    wrap.appendChild(presence);
    wrap.appendChild(chip);
    return wrap;
  }

  function installProfileChip() {
    removeBadProfileButtons();

    var target = findTopbarTarget();
    var chip = buildProfileChip();

    // Put it before SYNC if possible, otherwise append to topbar.
    var syncBtn = Array.from(target.querySelectorAll('button, a')).find(function (el) {
      return (el.textContent || '').trim().toLowerCase() === 'sync';
    });

    if (syncBtn && syncBtn.parentElement) {
      syncBtn.parentElement.insertBefore(chip, syncBtn);
    } else {
      target.appendChild(chip);
      if (target !== document.body) {
        target.style.display = target.style.display || 'flex';
        target.style.alignItems = target.style.alignItems || 'center';
      }
    }
  }

  function refreshOnlineCount() {
    var text = document.getElementById('lbOnlineText');
    if (!text) return;

    var count = 0;
    try {
      var users = window.usersDb || window.USERS || [];
      if (Array.isArray(users)) {
        var now = Date.now();
        count = users.filter(function (u) {
          var seen = Date.parse(u.last_seen_at || u.last_seen || u.lastSeen || '');
          return seen && (now - seen) <= 70000;
        }).length;
      }
    } catch (e) {}

    text.textContent = count > 1 ? (count + ' online') : 'Online';
  }

  document.addEventListener('DOMContentLoaded', function () {
    setTimeout(installProfileChip, 250);
    setTimeout(installProfileChip, 1200);
    setInterval(function () {
      removeBadProfileButtons();
      if (!document.getElementById('lbTopProfileChip')) installProfileChip();
      refreshOnlineCount();
    }, 5000);
  });
})();
</script>
